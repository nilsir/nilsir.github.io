language: node_js
node_js:
- 8.11.4
cache:
  directories:
  - node_modules
before_install:
- npm install hexo-cli -g
install:
- npm install
script:
- hexo clean
- hexo generate
after_script:
  - cd ./public
  - git init
  - git config user.name "nilsir"
  - git config user.email "nilsir@qq.com"
  - git add .
  - git commit -m "TravisCI 自动部署"
  # Github Pages
  - git push --force --quiet "https://${CI_TOKEN}@${GH_REF}" gh-pages:master

branches:
  only:
  - gh-pages

env:
 global:
   # Github Pages
   - GH_REF: github.com/nilsir/nilsir.github.io
